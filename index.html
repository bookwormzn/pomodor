<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --accent: #ff4f5e;
      --accent2: #ffb347;
      --accent3: #7c6fff;
      --text: #f0eeff;
      --muted: #6b6880;
      --border: rgba(255,255,255,0.06);
      --glow: rgba(255,79,94,0.35);
      --glow2: rgba(124,111,255,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated background mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,111,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(255,79,94,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 60% 40%, rgba(255,179,71,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .wrapper { position: relative; z-index: 1; }

    /* ── HEADER ── */
    .site-header {
      padding: 2rem 0 0;
      text-align: center;
    }
    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      letter-spacing: 0.18em;
      color: var(--text);
      line-height: 1;
    }
    .logo span { color: var(--accent); }
    .tagline {
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── MODE TABS ── */
    .mode-tabs {
      display: flex;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.3rem;
      width: fit-content;
      margin: 1.6rem auto 0;
    }
    .mode-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0.45rem 1.2rem;
      border-radius: 50px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .mode-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 18px var(--glow);
    }
    .mode-btn:hover:not(.active) { color: var(--text); }

    /* ── MAIN CARD ── */
    .timer-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.8rem 2.4rem 2.4rem;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .timer-card::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 220px; height: 120px;
      background: var(--accent);
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    .timer-card.break-mode::before { background: var(--accent3); }
    .timer-card.short-mode::before { background: var(--accent2); }

    /* ── RING SVG ── */
    .ring-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 1.6rem;
    }
    .ring-svg {
      transform: rotate(-90deg);
      width: 100%; height: 100%;
    }
    .ring-bg { fill: none; stroke: var(--surface); stroke-width: 8; }
    .ring-prog {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 628;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
      filter: drop-shadow(0 0 8px var(--glow));
    }
    .ring-prog.break-color { stroke: var(--accent3); filter: drop-shadow(0 0 8px var(--glow2)); }
    .ring-prog.short-color { stroke: var(--accent2); filter: drop-shadow(0 0 8px rgba(255,179,71,0.4)); }

    .time-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .time-text {
      font-family: 'Space Mono', monospace;
      font-size: 3.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }
    .mode-label {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    /* ── CONTROLS ── */
    .controls { display: flex; gap: 0.8rem; justify-content: center; align-items: center; }
    .btn-main {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.85rem 2.8rem;
      border-radius: 50px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 24px var(--glow);
    }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--glow); }
    .btn-main:active { transform: translateY(0); }
    .btn-main.paused { background: var(--accent3); box-shadow: 0 4px 24px var(--glow2); }

    .btn-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

    /* ── SESSION DOTS ── */
    .sessions-wrap { text-align: center; margin-top: 1.4rem; }
    .session-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      margin: 0 4px;
      transition: all 0.3s ease;
    }
    .session-dot.done { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--glow); }
    .sessions-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.5rem; }

    /* ── SETTINGS PANEL ── */
    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.6rem;
    }
    .settings-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.1rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-name { font-size: 0.82rem; color: var(--text); }
    .setting-ctrl {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .setting-val {
      font-family: 'Space Mono', monospace;
      font-size: 0.88rem;
      color: var(--accent);
      min-width: 28px;
      text-align: center;
    }
    .s-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .s-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── QUOTE CARD ── */
    .quote-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.6rem 1.8rem;
      position: relative;
      overflow: hidden;
    }
    .quote-card::after {
      content: '"';
      position: absolute;
      top: -10px; left: 10px;
      font-family: 'Bebas Neue', cursive;
      font-size: 8rem;
      color: var(--accent);
      opacity: 0.07;
      line-height: 1;
      pointer-events: none;
    }
    .quote-text {
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.65;
      color: var(--text);
      font-style: italic;
      transition: opacity 0.5s ease;
    }
    .quote-author {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 0.7rem;
      font-style: normal;
      font-weight: 500;
      transition: opacity 0.5s ease;
    }
    .quote-refresh {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s, transform 0.4s;
    }
    .quote-refresh:hover { color: var(--accent); transform: rotate(180deg); }

    /* ── SOUND TOGGLE ── */
    .sound-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 1rem;
    }
    .sound-label { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.08em; }
    .toggle-switch {
      position: relative; width: 42px; height: 23px;
      cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      transition: 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      height: 15px; width: 15px;
      left: 3px; bottom: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: var(--accent); border-color: var(--accent); }
    input:checked + .slider::before { transform: translateX(19px); background: #fff; }

    /* ── FOOTER ── */
    .site-footer {
      text-align: center;
      padding: 2rem 0;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── PULSE ANIM ── */
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 var(--glow); }
      70% { box-shadow: 0 0 0 12px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .running .ring-wrap { animation: pulse-ring 2s infinite; border-radius: 50%; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .timer-card, .settings-card, .quote-card {
      animation: fadeInUp 0.6s ease both;
    }
    .settings-card { animation-delay: 0.1s; }
    .quote-card { animation-delay: 0.2s; }

    /* notification badge */
    .session-count-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="container" style="max-width:820px; padding: 0 1rem;">

    <!-- HEADER -->
    <header class="site-header mb-4">
      <div class="logo">POMO<span>DORO</span></div>
      <div class="tagline">Odaklan · Dinlen · Tekrarla</div>
    </header>

    <!-- MODE TABS -->
    <div class="mode-tabs" id="modeTabs">
      <button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>
      <button class="mode-btn" data-mode="short">Kısa Mola</button>
      <button class="mode-btn" data-mode="long">Uzun Mola</button>
    </div>

    <div class="row g-3 mt-1">

      <!-- LEFT COLUMN: TIMER -->
      <div class="col-lg-7">
        <div class="timer-card" id="timerCard">
          <!-- Ring -->
          <div class="ring-wrap">
            <svg class="ring-svg" viewBox="0 0 220 220">
              <circle class="ring-bg" cx="110" cy="110" r="100"/>
              <circle class="ring-prog" id="ringProg" cx="110" cy="110" r="100"/>
            </svg>
            <div class="time-display">
              <div class="time-text" id="timeDisplay">25:00</div>
              <div class="mode-label" id="modeLabel">ODAKLAN</div>
            </div>
          </div>

          <!-- Controls -->
          <div class="controls">
            <button class="btn-icon" id="resetBtn" title="Sıfırla">↺</button>
            <button class="btn-main" id="startBtn">BAŞLA</button>
            <button class="btn-icon" id="skipBtn" title="Atla">⏭</button>
          </div>

          <!-- Session dots -->
          <div class="sessions-wrap">
            <div class="sessions-label">Oturum İlerlemesi</div>
            <div id="sessionDots"></div>
            <div class="session-count-badge" id="sessionBadge">0 / 4 tamamlandı</div>
          </div>

          <!-- Sound toggle -->
          <div class="sound-row">
            <span class="sound-label">🔔 Bildirim Sesi</span>
            <label class="toggle-switch">
              <input type="checkbox" id="soundToggle" checked />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN: SETTINGS + QUOTE -->
      <div class="col-lg-5 d-flex flex-column gap-3">

        <!-- Settings -->
        <div class="settings-card">
          <div class="settings-title">⚙ AYARLAR</div>
          <div class="setting-row">
            <span class="setting-name">Pomodoro (dk)</span>
            <div class="setting-ctrl">
              <button class="s-btn" onclick="changeSetting('pomodoro',-1)">−</button>
              <span class="setting-val" id="val-pomodoro">25</span>
              <button class="s-btn" onclick="changeSetting('pomodoro',1)">+</button>
            </div>
          </div>
          <div class="setting-row">
            <span class="setting-name">Kısa Mola (dk)</span>
            <div class="setting-ctrl">
              <button class="s-btn" onclick="changeSetting('short',-1)">−</button>
              <span class="setting-val" id="val-short">5</span>
              <button class="s-btn" onclick="changeSetting('short',1)">+</button>
            </div>
          </div>
          <div class="setting-row">
            <span class="setting-name">Uzun Mola (dk)</span>
            <div class="setting-ctrl">
              <button class="s-btn" onclick="changeSetting('long',-1)">−</button>
              <span class="setting-val" id="val-long">15</span>
              <button class="s-btn" onclick="changeSetting('long',1)">+</button>
            </div>
          </div>
          <div class="setting-row">
            <span class="setting-name">Uzun Mola Aralığı</span>
            <div class="setting-ctrl">
              <button class="s-btn" onclick="changeSetting('interval',-1)">−</button>
              <span class="setting-val" id="val-interval">4</span>
              <button class="s-btn" onclick="changeSetting('interval',1)">+</button>
            </div>
          </div>
        </div>

        <!-- Quote -->
        <div class="quote-card">
          <button class="quote-refresh" id="quoteRefreshBtn" title="Yeni söz">↻</button>
          <div class="quote-text" id="quoteText">Yükleniyor...</div>
          <div class="quote-author" id="quoteAuthor">—</div>
        </div>

      </div>
    </div>

    <footer class="site-footer">
      POMODORO ZAMANLAYICI · Üretkenliğin ritmi ⏱
    </footer>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── QUOTES ──
  const quotes = [
    { text: "Başlamak, başarının yarısıdır.", author: "Aristoteles" },
    { text: "Bir işi mükemmel yapamazsak bile, iyi yapmak yeterlidir.", author: "Voltaire" },
    { text: "Zaman en değerli şeydir; çünkü bir kez geçince geri gelmez.", author: "Theophrastus" },
    { text: "Bugün zor olanı yap, yarın daha zor şeyler kolay gelecektir.", author: "David Goggins" },
    { text: "Disiplin, motivasyonun bittiği yerde devreye girer.", author: "Elbert Hubbard" },
    { text: "Her uzun yolculuk tek bir adımla başlar.", author: "Lao Tzu" },
    { text: "Küçük adımlar büyük değişimlere yol açar.", author: "Tony Robbins" },
    { text: "Yapmaktan korktuğun şeyi yap; korku mutlaka ölecektir.", author: "Ralph W. Emerson" },
    { text: "Başarı, her gün tekrarlanan küçük çabaların toplamıdır.", author: "Robert Collier" },
    { text: "Odaklanmak, hayır demeyi bilmektir.", author: "Steve Jobs" },
    { text: "Bugünkü terler, yarınki zaferdir.", author: "Anonim" },
    { text: "Düşünceler eylem olmadan sadece rüyadır.", author: "Mary Wollstonecraft" },
    { text: "Başarının sırrı, başlamaktır.", author: "Mark Twain" },
    { text: "Zorluklar seni yıkmaz; karakterini ortaya çıkarır.", author: "Epiktetos" },
    { text: "Hayal et, inan, başar.", author: "Walt Disney" },
    { text: "Dikkatini verdiğin şey büyür.", author: "Robin Sharma" },
    { text: "Derin çalışma, sıradan insanları olağanüstü kılar.", author: "Cal Newport" },
    { text: "Zamanı yönetemeyen hiçbir şeyi yönetemez.", author: "Peter Drucker" },
    { text: "Bir saatlik konsantrasyon, bir günlük dağınık çalışmadan daha değerlidir.", author: "Anonim" },
    { text: "İlerlemek mükemmel olmaktan iyidir.", author: "Winston Churchill" },
    { text: "Hedefe odaklan, engellere değil.", author: "Anonim" },
    { text: "Tükenme, büyümenin işaretidir.", author: "Anonim" },
    { text: "Yorulmak isterdim ama hayallerim bırakmıyor.", author: "Anonim" },
    { text: "Her gün bir öncekinden daha iyi olmak için uğraş.", author: "Anonim" },
  ];

  let quoteIndex = Math.floor(Math.random() * quotes.length);
  function showQuote() {
    const q = quotes[quoteIndex];
    const qt = document.getElementById('quoteText');
    const qa = document.getElementById('quoteAuthor');
    qt.style.opacity = '0'; qa.style.opacity = '0';
    setTimeout(() => {
      qt.textContent = q.text;
      qa.textContent = '— ' + q.author;
      qt.style.opacity = '1'; qa.style.opacity = '1';
    }, 300);
  }
  function nextQuote() {
    quoteIndex = (quoteIndex + 1) % quotes.length;
    showQuote();
  }
  document.getElementById('quoteRefreshBtn').addEventListener('click', nextQuote);
  showQuote();

  // Change quote every new session
  function rotateQuoteOnSession() { nextQuote(); }

  // ── SETTINGS ──
  const settings = { pomodoro: 25, short: 5, long: 15, interval: 4 };
  const mins = { pomodoro: [1,99], short: [1,30], long: [1,60], interval: [1,10] };
  function changeSetting(key, delta) {
    const [min, max] = mins[key];
    settings[key] = Math.min(max, Math.max(min, settings[key] + delta));
    document.getElementById('val-' + key).textContent = settings[key];
    if (currentMode === key || (currentMode === 'pomodoro' && key === 'pomodoro')) {
      if (!isRunning) resetTimer();
    }
  }

  // ── TIMER STATE ──
  let currentMode = 'pomodoro';
  let timeLeft = settings.pomodoro * 60;
  let totalTime = settings.pomodoro * 60;
  let isRunning = false;
  let interval = null;
  let sessionsCompleted = 0;
  const maxSessions = 4;

  const CIRCUMFERENCE = 2 * Math.PI * 100; // 628.3
  const modeConfig = {
    pomodoro: { label: 'ODAKLAN', settingKey: 'pomodoro', colorClass: '' },
    short:    { label: 'KISA MOLA', settingKey: 'short', colorClass: 'short-color' },
    long:     { label: 'UZUN MOLA', settingKey: 'long', colorClass: 'break-color' },
  };

  function buildDots() {
    const wrap = document.getElementById('sessionDots');
    wrap.innerHTML = '';
    for (let i = 0; i < settings.interval; i++) {
      const d = document.createElement('span');
      d.className = 'session-dot' + (i < sessionsCompleted % settings.interval ? ' done' : '');
      wrap.appendChild(d);
    }
    document.getElementById('sessionBadge').textContent =
      sessionsCompleted + ' / ' + settings.interval + ' tamamlandı';
  }

  function updateRing() {
    const prog = document.getElementById('ringProg');
    const frac = timeLeft / totalTime;
    prog.style.strokeDashoffset = CIRCUMFERENCE * (1 - frac);
    prog.className = 'ring-prog ' + modeConfig[currentMode].colorClass;
  }

  function updateDisplay() {
    const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
    const s = String(timeLeft % 60).padStart(2, '0');
    document.getElementById('timeDisplay').textContent = m + ':' + s;
    document.title = m + ':' + s + ' — Pomodoro';
    updateRing();
  }

  function setMode(mode) {
    currentMode = mode;
    const cfg = modeConfig[mode];
    timeLeft = settings[cfg.settingKey] * 60;
    totalTime = timeLeft;
    stopTimer();
    document.getElementById('modeLabel').textContent = cfg.label;

    const card = document.getElementById('timerCard');
    card.className = 'timer-card';
    if (mode === 'long') card.classList.add('break-mode');
    if (mode === 'short') card.classList.add('short-mode');

    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    document.getElementById('startBtn').textContent = 'BAŞLA';
    document.getElementById('startBtn').classList.remove('paused');
    updateDisplay();
    buildDots();
  }

  function startTimer() {
    isRunning = true;
    document.getElementById('startBtn').textContent = 'DURDUR';
    document.getElementById('startBtn').classList.add('paused');
    document.getElementById('timerCard').classList.add('running');
    interval = setInterval(() => {
      timeLeft--;
      updateDisplay();
      if (timeLeft <= 0) {
        clearInterval(interval);
        isRunning = false;
        onTimerEnd();
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(interval);
    isRunning = false;
    document.getElementById('startBtn').textContent = 'BAŞLA';
    document.getElementById('startBtn').classList.remove('paused');
    document.getElementById('timerCard').classList.remove('running');
  }

  function resetTimer() {
    stopTimer();
    timeLeft = settings[modeConfig[currentMode].settingKey] * 60;
    totalTime = timeLeft;
    updateDisplay();
  }

  function onTimerEnd() {
    document.getElementById('timerCard').classList.remove('running');
    document.getElementById('startBtn').textContent = 'BAŞLA';
    document.getElementById('startBtn').classList.remove('paused');

    if (document.getElementById('soundToggle').checked) playBeep();

    if (currentMode === 'pomodoro') {
      sessionsCompleted++;
      rotateQuoteOnSession();
      buildDots();
      if (sessionsCompleted % settings.interval === 0) {
        setMode('long');
        showToast('🎉 Uzun mola zamanı! ' + settings.long + ' dakika dinlen.');
      } else {
        setMode('short');
        showToast('☕ Kısa mola! ' + settings.short + ' dakika.');
      }
    } else {
      setMode('pomodoro');
      showToast('🍅 Odaklanma zamanı! ' + settings.pomodoro + ' dakika.');
    }
  }

  // ── BEEP ──
  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.8);
    } catch(e) {}
  }

  // ── TOAST ──
  function showToast(msg) {
    let t = document.getElementById('toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast';
      t.style.cssText = `
        position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
        background:var(--card);border:1px solid var(--border);
        color:var(--text);padding:.75rem 1.5rem;border-radius:50px;
        font-size:.82rem;letter-spacing:.06em;
        box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;
        transition:all .4s ease;z-index:9999;white-space:nowrap;
      `;
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(t._hide);
    t._hide = setTimeout(() => {
      t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)';
    }, 3000);
  }

  // ── EVENTS ──
  document.getElementById('startBtn').addEventListener('click', () => {
    if (isRunning) stopTimer(); else startTimer();
  });
  document.getElementById('resetBtn').addEventListener('click', resetTimer);
  document.getElementById('skipBtn').addEventListener('click', () => {
    stopTimer();
    onTimerEnd();
  });
  document.getElementById('modeTabs').addEventListener('click', e => {
    if (e.target.dataset.mode) setMode(e.target.dataset.mode);
  });

  // ── INIT ──
  setMode('pomodoro');
</script>
</body>
</html>
